name: Python wheels

on:
  push:
    tags: ["v*", "py-v*"]
  pull_request:
    paths:
      - "crates/spatialrust-py/**"
      - ".github/workflows/python-wheels.yml"
  workflow_dispatch:

env:
  MANIFEST: crates/spatialrust-py/Cargo.toml

jobs:
  wheels:
    name: Build wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # abi3-py38: one wheel covers CPython 3.8+.
          args: --release --manifest-path ${{ env.MANIFEST }} --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path ${{ env.MANIFEST }} --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Publishes to PyPI on tag pushes. Requires the MATURIN_PYPI_TOKEN secret;
  # the job is skipped on PRs and manual runs.
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [wheels, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
