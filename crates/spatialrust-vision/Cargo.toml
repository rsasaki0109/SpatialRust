[package]
name = "spatialrust-vision"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "AI-ready image processing and vision algorithms for SpatialRust"

[features]
default = []
resize = []
preprocess = ["resize"]
warp = ["resize"]
imgproc-filter = []
imgproc-morphology = []
imgproc-analysis = []
imgproc-canny = ["imgproc-filter"]
feature2d = ["imgproc-filter", "resize"]
geometry = ["dep:spatialrust-camera"]
detection = []
dense = ["detection"]
spatial = ["dense", "dep:spatialrust-core", "dep:spatialrust-camera"]
full = ["preprocess", "warp", "imgproc-filter", "imgproc-morphology", "imgproc-analysis", "imgproc-canny", "feature2d", "geometry", "detection", "dense", "spatial"]

[dependencies]
spatialrust-image.workspace = true
spatialrust-math.workspace = true
spatialrust-core = { workspace = true, optional = true }
spatialrust-camera = { workspace = true, optional = true }
thiserror.workspace = true

[dev-dependencies]
criterion.workspace = true
proptest.workspace = true

[[bench]]
name = "preprocess"
harness = false
required-features = ["preprocess"]

[[bench]]
name = "filter"
harness = false
required-features = ["imgproc-filter"]

[[bench]]
name = "morphology"
harness = false
required-features = ["imgproc-morphology"]

[[bench]]
name = "analysis"
harness = false
required-features = ["imgproc-analysis"]

[[bench]]
name = "canny"
harness = false
required-features = ["imgproc-canny"]

[[bench]]
name = "feature2d"
harness = false
required-features = ["feature2d"]
