[package]
name = "spatialrust"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Next-generation spatial computing framework for Rust"

[features]
default = []
serde = ["spatialrust-core/serde", "spatialrust-math/serde"]
tensor-aoso = ["spatialrust-core/tensor-aoso"]
io-pcd = ["spatialrust-io/io-pcd"]
io-ply = ["spatialrust-io/io-ply"]
io-las = ["spatialrust-io/io-las"]
io-laz = ["spatialrust-io/io-laz"]
io-e57 = ["spatialrust-io/io-e57"]
io-copc = ["spatialrust-io/io-copc"]
io-copc-http = ["io-copc", "spatialrust-io/io-copc-http"]
search-kdtree = ["spatialrust-search/search-kdtree"]
search-parallel = ["search-kdtree", "spatialrust-search/parallel"]
search-graph = ["spatialrust-search/search-graph"]
filter-voxel = ["spatialrust-filtering/filter-voxel"]
filter-voxel-gpu = [
    "spatialrust-filtering/filter-voxel-gpu",
    "gpu-wgpu",
]
filter-outlier = [
    "spatialrust-filtering/filter-outlier",
    "spatialrust-search/search-kdtree",
]
filter-crop = ["spatialrust-filtering/filter-crop"]
filter-fps = ["spatialrust-filtering/filter-fps"]
filter-mls = [
    "spatialrust-filtering/filter-mls",
    "spatialrust-search/search-kdtree",
]
feature-normal = ["spatialrust-features/feature-normal", "spatialrust-search/search-kdtree"]
feature-iss = ["spatialrust-features/feature-iss", "spatialrust-search/search-kdtree"]
feature-normal-orient = [
    "spatialrust-features/feature-normal-orient",
    "spatialrust-search/search-kdtree",
]
feature-boundary = [
    "spatialrust-features/feature-boundary",
    "spatialrust-search/search-kdtree",
]
feature-normal-gpu = [
    "spatialrust-features/feature-normal-gpu",
    "feature-normal",
    "gpu-wgpu",
]
segment-ransac-plane = ["spatialrust-segmentation/segment-ransac-plane"]
segment-ransac-plane-gpu = [
    "spatialrust-segmentation/segment-ransac-plane-gpu",
    "gpu-wgpu",
]
segment-multi-plane = ["spatialrust-segmentation/segment-multi-plane"]
segment-euclidean = [
    "spatialrust-segmentation/segment-euclidean",
    "spatialrust-search/search-kdtree",
]
segment-euclidean-gpu = [
    "spatialrust-segmentation/segment-euclidean-gpu",
    "gpu-wgpu",
]
segment-dbscan = [
    "spatialrust-segmentation/segment-dbscan",
    "spatialrust-search/search-kdtree",
]
segment-ransac-primitives = ["spatialrust-segmentation/segment-ransac-primitives"]
segment-ground = ["spatialrust-segmentation/segment-ground"]
segment-region-growing = [
    "spatialrust-segmentation/segment-region-growing",
    "spatialrust-search/search-kdtree",
]
register-icp = [
    "spatialrust-registration/register-icp",
    "spatialrust-search/search-kdtree",
]
register-icp-point-to-plane = [
    "spatialrust-registration/register-icp-point-to-plane",
    "spatialrust-search/search-kdtree",
]
register-gicp = [
    "spatialrust-registration/register-gicp",
    "spatialrust-search/search-kdtree",
]
register-gicp-gpu = [
    "spatialrust-registration/register-gicp-gpu",
    "register-gicp",
    "gpu-wgpu",
]
register-ndt = ["spatialrust-registration/register-ndt"]
register-fpfh = [
    "spatialrust-registration/register-fpfh",
    "spatialrust-search/search-kdtree",
]
mvp = [
    "io-pcd",
    "io-ply",
    "io-las",
    "io-copc",
    "filter-voxel",
    "feature-normal",
    "search-kdtree",
    "segment-ransac-plane",
    "segment-euclidean",
    "register-icp",
    "pipeline-mvp",
]
mvp-http = ["mvp", "io-copc-http"]
pipeline-mvp = ["spatialrust-pipeline/pipeline-mvp"]
pipeline-mvp-gpu = [
    "spatialrust-pipeline/pipeline-mvp-gpu",
    "filter-voxel-gpu",
    "segment-ransac-plane-gpu",
    "feature-normal-gpu",
    "segment-euclidean-gpu",
]
gpu-wgpu = ["spatialrust-gpu/gpu-wgpu"]
gpu-aoso-staging = ["gpu-wgpu", "tensor-aoso", "spatialrust-gpu/gpu-aoso-staging"]
gpu-image = ["gpu-wgpu", "image", "spatialrust-gpu/gpu-image"]
metrics-distance = ["spatialrust-metrics/metrics-distance"]
transform-ops = ["spatialrust-transform/transform-ops"]
voxelize-occupancy = ["spatialrust-voxelize/voxelize-occupancy"]
voxelize-range-image = ["spatialrust-voxelize/voxelize-range-image"]
image = ["dep:spatialrust-image"]
tensor = ["dep:spatialrust-tensor"]
tensor-image = ["tensor", "image", "spatialrust-tensor/image"]
tensor-spatial = ["tensor", "spatialrust-tensor/spatial"]
tensor-dlpack = ["tensor", "spatialrust-tensor/dlpack"]
ai = ["tensor", "dep:spatialrust-ai"]
ai-onnxruntime = ["ai", "spatialrust-ai/onnxruntime"]
ai-onnxruntime-cuda = ["ai-onnxruntime", "spatialrust-ai/onnxruntime-cuda"]
ai-onnxruntime-tensorrt = ["ai-onnxruntime-cuda", "spatialrust-ai/onnxruntime-tensorrt"]
ai-onnxruntime-directml = ["ai-onnxruntime", "spatialrust-ai/onnxruntime-directml"]
image-io = ["image", "dep:spatialrust-image-io"]
image-io-standard = ["image-io", "spatialrust-image-io/standard"]
image-io-tiff = ["image-io", "spatialrust-image-io/tiff"]
image-io-openexr = ["image-io", "spatialrust-image-io/openexr"]
image-io-full = ["image-io-standard", "image-io-tiff", "image-io-openexr"]
camera = ["dep:spatialrust-camera"]
camera-rgbd = ["image", "camera"]
vision = ["image", "dep:spatialrust-vision"]
vision-resize = ["vision", "spatialrust-vision/resize"]
vision-preprocess = ["vision-resize", "spatialrust-vision/preprocess"]
vision-warp = ["vision-resize", "spatialrust-vision/warp"]
vision-imgproc-filter = ["vision", "spatialrust-vision/imgproc-filter"]
vision-imgproc-morphology = ["vision", "spatialrust-vision/imgproc-morphology"]
vision-imgproc-analysis = ["vision", "spatialrust-vision/imgproc-analysis"]
vision-imgproc-canny = ["vision-imgproc-filter", "spatialrust-vision/imgproc-canny"]
vision-feature2d = ["vision", "spatialrust-vision/feature2d"]
vision-geometry = ["vision", "camera", "spatialrust-vision/geometry"]
vision-detection = ["vision", "spatialrust-vision/detection"]
vision-dense = ["vision-detection", "spatialrust-vision/dense"]
vision-spatial = ["vision-dense", "camera-rgbd", "spatialrust-vision/spatial"]
vision-ai-adapters = ["vision-preprocess", "vision-dense", "tensor-image", "spatialrust-vision/ai-adapters"]
vision-full = [
    "vision-preprocess",
    "vision-warp",
    "vision-imgproc-filter",
    "vision-imgproc-morphology",
    "vision-imgproc-analysis",
    "vision-imgproc-canny",
    "vision-feature2d",
    "vision-geometry",
    "vision-detection",
    "vision-dense",
    "vision-spatial",
    "vision-ai-adapters",
]
ai-vision-pipeline = ["ai", "vision-ai-adapters", "vision-spatial"]

[dependencies]
spatialrust-core = { workspace = true }
spatialrust-math = { workspace = true }
spatialrust-io = { workspace = true }
spatialrust-gpu = { workspace = true }
spatialrust-search = { workspace = true }
spatialrust-filtering = { workspace = true }
spatialrust-features = { workspace = true }
spatialrust-segmentation = { workspace = true }
spatialrust-registration = { workspace = true }
spatialrust-pipeline = { workspace = true }
spatialrust-metrics = { workspace = true }
spatialrust-transform = { workspace = true }
spatialrust-voxelize = { workspace = true }
spatialrust-image = { workspace = true, optional = true }
spatialrust-tensor = { workspace = true, optional = true }
spatialrust-ai = { workspace = true, optional = true }
spatialrust-image-io = { workspace = true, optional = true }
spatialrust-camera = { workspace = true, optional = true }
spatialrust-vision = { workspace = true, optional = true }

[dev-dependencies]

[[bin]]
name = "spatialrust-mvp"
path = "src/bin/spatialrust_mvp.rs"
required-features = ["mvp"]

[[example]]
name = "readme_mvp_preview"
path = "examples/readme_mvp_preview.rs"
required-features = ["mvp"]

[[example]]
name = "bench_ops"
path = "examples/bench_ops.rs"
required-features = ["mvp", "filter-outlier"]

[[example]]
name = "bench_ransac_plane"
path = "examples/bench_ransac_plane.rs"
required-features = [
    "segment-ransac-plane",
    "segment-ransac-plane-gpu",
    "io-pcd",
    "gpu-wgpu",
    "filter-voxel",
    "feature-normal",
]

[[example]]
name = "bench_euclidean_cluster"
path = "examples/bench_euclidean_cluster.rs"
required-features = [
    "segment-euclidean",
    "segment-euclidean-gpu",
    "segment-ransac-plane",
    "io-pcd",
    "gpu-wgpu",
    "filter-voxel",
    "feature-normal",
]
